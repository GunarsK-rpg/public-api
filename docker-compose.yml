services:
  api:
    build: .
    ports:
      - "8182:8182"
    environment:
      - SERVICE_NAME=public-api
      - PORT=8182
      - ENVIRONMENT=development
      # GIN_MODE=release for containerized runs (debug in .env.example for local dev)
      - GIN_MODE=release
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=cosmere_rpg
      - DB_SSL_MODE=disable
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - MAX_BODY_SIZE=1048576
